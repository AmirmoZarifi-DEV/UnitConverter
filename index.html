<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <title>Unit Converter</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>

<div class="converter">

    <h2 class="title">مبدل</h2>

    <div class="input-group">
        <label>مقدار (CM)</label>
        <input type="number" id="inputValue" placeholder="عدد وارد کن">
    </div>

    <div class="input-group">
        <label>نتیجه (M)</label>
        <input type="text" id="resultValue" readonly>
    </div>

    <div class="buttons">
        <button>CM → M</button>
        <button>M → Inch</button>
        <button>KM → CM</button>
        <button>CM → Inch</button>
    </div>
    <button class="submit" type="submit">تبدیل کن</button>

</div>
<script src="./app.js"></script>
</body>
</html>
